<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="'DejaVu Sans', 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B6B2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E8B3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A5D6A7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90CAF9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCC80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CE93D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layer5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE082;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="720" height="44" rx="6" ry="6" fill="url(#headerGrad)"/>
  <text x="360" y="29" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Stack Technologique — Baligh</text>

  <!-- ===== LAYER 1: PRESENTATION ===== -->
  <rect x="40" y="60" width="640" height="80" rx="10" ry="10" fill="url(#layer1)" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="83" text-anchor="middle" fill="#1B5E20" font-size="14" font-weight="bold">COUCHE PRÉSENTATION (Frontend)</text>
  
  <rect x="58" y="96" width="140" height="32" rx="6" ry="6" fill="white" stroke="#2E7D32" stroke-width="1"/>
  <image x="68" y="101" width="20" height="20" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232E7D32'%3E%3Cpath d='M14.5 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zM19 9c0 3-2.5 5.5-5.5 5.5h-3C10 14.5 7.5 12 7.5 9V7c0-1.1.9-2 2-2s2 .9 2 2v2c0 .6-.4 1-1 1s-1-.4-1-1H9c0 1.7 1.3 3 3 3s3-1.3 3-3V7c0-1.1.9-2 2-2s2 .9 2 2v2z'/%3E%3C/svg%3E"/>
  <text x="100" y="115" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Flutter 3.3+</text>
  <text x="100" y="125" text-anchor="middle" fill="#666" font-size="8">Framework Dart</text>

  <rect x="215" y="96" width="140" height="32" rx="6" ry="6" fill="white" stroke="#2E7D32" stroke-width="1"/>
  <text x="285" y="115" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Dart 3.x</text>
  <text x="285" y="125" text-anchor="middle" fill="#666" font-size="8">Langage</text>

  <rect x="372" y="96" width="140" height="32" rx="6" ry="6" fill="white" stroke="#2E7D32" stroke-width="1"/>
  <text x="442" y="115" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Material 3</text>
  <text x="442" y="125" text-anchor="middle" fill="#666" font-size="8">Design System</text>

  <rect x="528" y="96" width="140" height="32" rx="6" ry="6" fill="white" stroke="#2E7D32" stroke-width="1"/>
  <text x="598" y="115" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Google Fonts</text>
  <text x="598" y="125" text-anchor="middle" fill="#666" font-size="8">Cairo (Arabe)</text>

  <!-- Arrow -->
  <line x1="360" y1="140" x2="360" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== LAYER 2: STATE & UI ===== -->
  <rect x="40" y="165" width="640" height="80" rx="10" ry="10" fill="url(#layer2)" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="188" text-anchor="middle" fill="#0D47A1" font-size="14" font-weight="bold">COUCHE GESTION D'ÉTAT</text>

  <rect x="58" y="201" width="185" height="32" rx="6" ry="6" fill="white" stroke="#1565C0" stroke-width="1"/>
  <text x="150" y="220" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Provider 6.1.2</text>
  <text x="150" y="230" text-anchor="middle" fill="#666" font-size="8">ChangeNotifier + Consumer/Selector</text>

  <rect x="260" y="201" width="185" height="32" rx="6" ry="6" fill="white" stroke="#1565C0" stroke-width="1"/>
  <text x="352" y="220" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">9 Contrôleurs</text>
  <text x="352" y="230" text-anchor="middle" fill="#666" font-size="8">Report, Auth, Chat, Alert, ...</text>

  <rect x="462" y="201" width="205" height="32" rx="6" ry="6" fill="white" stroke="#1565C0" stroke-width="1"/>
  <text x="564" y="220" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">SharedPreferences</text>
  <text x="564" y="230" text-anchor="middle" fill="#666" font-size="8">Persistance thème + langue</text>

  <line x1="360" y1="245" x2="360" y2="265" stroke="#555" stroke-width="1.5" marker-end="url(#arrowDown)"/>

