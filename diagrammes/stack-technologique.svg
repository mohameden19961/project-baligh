  <rect x="40" y="270" width="640" height="80" rx="10" ry="10" fill="url(#layer3)" stroke="#E65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="293" text-anchor="middle" fill="#BF360C" font-size="14" font-weight="bold">COUCHE FONCTIONS & CARTOGRAPHIE</text>

  <rect x="55" y="306" width="120" height="32" rx="6" ry="6" fill="white" stroke="#E65100" stroke-width="1"/>
  <text x="115" y="325" text-anchor="middle" fill="#BF360C" font-size="10" font-weight="bold">flutter_map</text>

  <rect x="185" y="306" width="120" height="32" rx="6" ry="6" fill="white" stroke="#E65100" stroke-width="1"/>
  <text x="245" y="325" text-anchor="middle" fill="#BF360C" font-size="10" font-weight="bold">FMTC Cache</text>

  <rect x="315" y="306" width="120" height="32" rx="6" ry="6" fill="white" stroke="#E65100" stroke-width="1"/>
  <text x="375" y="325" text-anchor="middle" fill="#BF360C" font-size="10" font-weight="bold">geolocator</text>

  <rect x="445" y="306" width="120" height="32" rx="6" ry="6" fill="white" stroke="#E65100" stroke-width="1"/>
  <text x="505" y="325" text-anchor="middle" fill="#BF360C" font-size="10" font-weight="bold">image_picker</text>

  <rect x="575" y="306" width="92" height="32" rx="6" ry="6" fill="white" stroke="#E65100" stroke-width="1"/>
  <text x="621" y="325" text-anchor="middle" fill="#BF360C" font-size="10" font-weight="bold">url_launcher</text>

  <line x1="360" y1="350" x2="360" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ===== LAYER 4: BACKEND ===== -->
  <rect x="40" y="375" width="640" height="80" rx="10" ry="10" fill="url(#layer4)" stroke="#7B1FA2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="398" text-anchor="middle" fill="#4A148C" font-size="14" font-weight="bold">COUCHE BACKEND (Supabase)</text>

  <rect x="55" y="411" width="145" height="32" rx="6" ry="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
  <text x="127" y="429" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="bold">PostgreSQL 15</text>
  <text x="127" y="440" text-anchor="middle" fill="#666" font-size="8">Base de données + RLS</text>

  <rect x="212" y="411" width="145" height="32" rx="6" ry="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
  <text x="284" y="429" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="bold">Supabase Auth</text>
  <text x="284" y="440" text-anchor="middle" fill="#666" font-size="8">Email + Google OAuth</text>

  <rect x="369" y="411" width="145" height="32" rx="6" ry="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
  <text x="441" y="429" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="bold">Supabase Storage</text>
  <text x="441" y="440" text-anchor="middle" fill="#666" font-size="8">Bucket "reports"</text>

  <rect x="526" y="411" width="142" height="32" rx="6" ry="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
  <text x="597" y="429" text-anchor="middle" fill="#4A148C" font-size="10" font-weight="bold">Supabase Realtime</text>
  <text x="597" y="440" text-anchor="middle" fill="#666" font-size="8">Messages en direct</text>

  <line x1="360" y1="455" x2="360" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ===== LAYER 5: DEPLOYMENT ===== -->
  <rect x="40" y="480" width="640" height="80" rx="10" ry="10" fill="url(#layer5)" stroke="#F57F17" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="503" text-anchor="middle" fill="#E65100" font-size="14" font-weight="bold">COUCHE DÉPLOIEMENT</text>

  <rect x="58" y="516" width="190" height="32" rx="6" ry="6" fill="white" stroke="#F57F17" stroke-width="1"/>
  <text x="153" y="535" text-anchor="middle" fill="#E65100" font-size="11" font-weight="bold">Android APK (AAB)</text>
  <text x="153" y="545" text-anchor="middle" fill="#666" font-size="8">Google Play Store</text>

  <rect x="265" y="516" width="190" height="32" rx="6" ry="6" fill="white" stroke="#F57F17" stroke-width="1"/>
  <text x="360" y="535" text-anchor="middle" fill="#E65100" font-size="11" font-weight="bold">Git + GitHub</text>
  <text x="360" y="545" text-anchor="middle" fill="#666" font-size="8">Gestion de versions</text>

  <rect x="472" y="516" width="195" height="32" rx="6" ry="6" fill="white" stroke="#F57F17" stroke-width="1"/>
  <text x="569" y="535" text-anchor="middle" fill="#E65100" font-size="11" font-weight="bold">Vercel (Admin Web)</text>
  <text x="569" y="545" text-anchor="middle" fill="#666" font-size="8">HTML/CSS/JS statique</text>

  <!-- Bottom labels -->
  <text x="360" y="588" text-anchor="middle" fill="#999" font-size="9">Architecture multicouche : séparation stricte des responsabilités</text>
</svg>
